[build]
  command = "echo 'Static site — no build step'"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/welcome"
  to = "/welcome.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
