<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Area Way Search 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="wordmark">
      <span class="dot" id="statusDot"></span>
      Area Way Search 2
    </div>
    <div class="status-readout">privado · seguro</div>
  </header>

  <main class="stage" id="searchStage">

    <h1 class="headline">O que procuras?</h1>

    <form class="search-shell" id="searchForm" autocomplete="off">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.6"/>
        <line x1="15.4" y1="15.4" x2="21" y2="21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Pesquisar…" aria-label="Pesquisar" />
      <button type="submit" class="go" aria-label="Pesquisar">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h13M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </form>

    <div class="suggestions" id="suggestions">
      <button class="freq" data-q="previsão do tempo">previsão do tempo</button>
      <button class="freq" data-q="cotação do euro">cotação do euro</button>
      <button class="freq" data-q="notícias de hoje">notícias de hoje</button>
      <button class="freq" data-q="receitas rápidas">receitas rápidas</button>
    </div>

  </main>

  <footer class="footbar">
    <span class="mono">privado · seguro</span>
    <span class="mono">Area Way Search 2</span>
  </footer>

  <script>
    var authed = sessionStorage.getItem("inovar_authenticated") === "true";
    var inShell = typeof window.inovar !== "undefined";

    if (authed || inShell) {
      if (!authed && inShell) {
        (async function() {
          try {
            var ok = await window.inovar.authenticate();
            if (ok) {
              sessionStorage.setItem("inovar_authenticated", "true");
              return;
            }
          } catch(e) {}
          window.location.href = "index.html";
        })();
      }

      var searchForm = document.getElementById("searchForm");
      var searchInput = document.getElementById("searchInput");
      var suggestions = document.getElementById("suggestions");

      function runSearch(query) {
        var q = query.trim();
        if (!q) return;
        window.inovar.search(q);
      }

      searchForm.addEventListener("submit", function(e) {
        e.preventDefault();
        runSearch(searchInput.value);
      });

      suggestions.addEventListener("click", function(e) {
        var btn = e.target.closest(".freq");
        if (!btn) return;
        searchInput.value = btn.dataset.q;
        runSearch(btn.dataset.q);
      });
    } else {
      document.getElementById("searchStage").innerHTML =
        '<div style="text-align:center;padding:80px 24px">' +
        '<h1 style="font-size:36px;margin:0 0 12px;font-weight:300">' + String.fromCharCode(9201) + '</h1>' +
        '<p style="color:var(--muted);font-size:14px;line-height:1.6">' +
        'Acesso restrito.<br>Esta página só está disponível através do browser Area Way.' +
        '</p></div>';
    }
  </script>
</body>
</html>
